name: Basic Code Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "현재 저장소 파일 목록"
          ls -R

      - name: Check required folders
        run: |
          test -d java || (echo "java 폴더 없음" && exit 1)
          test -d jsp || (echo "jsp 폴더 없음" && exit 1)
          test -d xml || (echo "xml 폴더 없음" && exit 1)
          test -d sql || (echo "sql 폴더 없음" && exit 1)

      - name: Check JSP files
        run: |
          echo "JSP 파일 목록"
          find jsp -name "*.jsp" -print

      - name: Check XML files
        run: |
          echo "XML 파일 목록"
          find xml -name "*.xml" -print
           - name: XML 문법 검사       ← 여기부터 추가
      - run: |
          sudo apt-get install -y libxml2-utils
          find xml -name "*.xml" | xargs xmllint --noout
